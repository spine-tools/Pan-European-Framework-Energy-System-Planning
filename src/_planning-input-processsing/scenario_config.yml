scenarios:
  baseline_blended_representative_periods: ["Base","wy2009","y2030_wy2009","y2040_wy2009","y2050_wy2009","medium_bio","current","GA","GA_flex0"]#,"y2030_wy2009","y2040_wy2009","y2050_wy2009"
emission_factor: 1.0 #percentage of carbon budget considered in the model based on the included countries
resolution: "1h"
future_inflation: 0.03
default_technology_discount_rate: 0.05
solver: "Gurobi.jl" # HiGHS.jl
# configurable cyclic condition, storage options: battery-storage-iron-air,batter-storage,truck-DR,bus-DR,van-DR,car-DR
long-term-storage: [battery-storage-iron-air]
short-term-storage: [battery-storage,PH-reservoir,truck-DR,bus-DR,van-DR,car-DR]
ratio_ground_air_HP: 0.3
include_biomass_potential_limitations: True
biomass_potential_realistic: 0.45
no_investable_2030:
  # Here we define the technologies that cannot be built by 2030 so then they cannot be investable in that year since there is no enough time for the construction.
  unit:
    - nuclear-3
    - SCPC
    - SCPC+CC
    - waste-ST
    - SMR
    - SMR+CC
    - (BM)MeOH
    - (COEL)MeOH-MEA
    - (H2)MeOH-DC
    - DAC
  connection:
    - H2
    - elec
  node:
    - salt-cavern
include_ramping: False
ramping:
  nuclear-3: 
    - elec
    - 0.07
  CCGT: 
    - elec
    - 0.4
  SCPC: 
    - elec
    - 0.15
  (BM)FT:
    - HC
    - 0.08
  (COEL)FT-MEA:
    - HC 
    - 0.1
  (H2)FT-DC:
    - HC
    - 0.1
  REF-SMR:
    - HC 
    - 0.002
  REF-SMR-MEA:
    - HC 
    - 0.002
  REF(H2):
    - HC 
    - 0.002
  methanation:
    - CH4
    - 0.1
  bio-diges-up:
    - CH4
    - 0.0008
  SMR:
    - H2
    - 0.02
  LNG-terminal:
    - CH4
    - 0.2
  gas-extraction:
    - CH4
    - 0.05
include_refinery_trajectory: True
refineries:
  fossil:
    techs:
      - REF-SMR
      - REF-SMR-MEA
      - REF(H2)
  bio:
    share_2030: 0.10
    share_2040: 0.25
    share_2050: 0.25
    techs:
      - (BM)FT
  syn:
    share_2030: 0.02
    share_2040: 0.20
    share_2050: 0.65
    techs:
      - (COEL)FT-MEA
      - (H2)FT-DC

